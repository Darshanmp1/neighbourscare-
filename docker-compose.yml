version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: neighbourscare-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: neighbourscare-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/neighbourscare
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - JWT_EXPIRE=30d
      - CORS_ORIGIN=http://localhost:8080
    depends_on:
      - mongodb
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: neighbourscare-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
